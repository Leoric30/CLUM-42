spring.application.name=clum

# ── Base de datos PostgreSQL ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate: solo VALIDA el esquema (Flyway es quien crea las tablas) ──
# NUNCA usar "update" o "create" en producción con Flyway activo.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect — eliminado: Hibernate lo detecta automáticamente

# ── Flyway: migraciones de base de datos ──────────────────────
# Flyway busca automáticamente scripts en /db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# El esquema fue creado sin Flyway (ddl-auto=create). baseline-on-migrate
# le indica a Flyway que la BD ya está en el estado de baseline-version (V4)
# y que solo debe aplicar las migraciones posteriores (V5, V6...).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

# ── Subida de archivos (para comprobantes de pago e inscripción) ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Jackson: serialización de fechas Java 8 ───────────────────
# LocalDate/LocalDateTime se serializa como ISO-8601 ("2024-03-15")
# en lugar de array [2024, 3, 15]. En Jackson 3 (Spring Boot 4), esta
# feature se configura bajo datatype.datetime, no serialization.
spring.jackson.datatype.datetime.WRITE_DATES_AS_TIMESTAMPS=false

# ── JWT ───────────────────────────────────────────────────────
# Secret para firmar tokens (HMAC-SHA256). En producción inyectar JWT_SECRET.
# Mínimo 32 caracteres (256 bits) para HS256.
jwt.secret=${JWT_SECRET}
# Duración del token: 86400000 ms = 24 horas
jwt.expiration-ms=86400000

# ── AWS S3 (variables de entorno, nunca hardcodeadas) ─────────
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.bucket-name=${AWS_BUCKET_NAME}

# ── Inscripción: contraseña temporal para aspirantes ──────────
enrollment.temporary-password=${ENROLLMENT_TEMP_PASSWORD}

# ── Perfil activo (dev, prod, etc.) ──────
spring.profiles.active=dev
