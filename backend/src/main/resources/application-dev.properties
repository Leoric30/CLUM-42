# ── Configuración exclusiva del perfil dev ────────────────────────────────────
# Este archivo sobreescribe application.properties cuando se corre con -Dspring-boot.run.profiles=dev
# NO commitear credenciales reales aquí. Para valores locales usa application-local.properties (gitignored).

# ── Base de datos (desarrollo local) ─────────────────────────────────────────
spring.datasource.username=postgres
spring.datasource.password=admin

# ── JWT (desarrollo local — solo para correr el servidor, NO usar en producción) ──
jwt.secret=clum-dev-secret-changeme-must-be-32chars!!

# ── Contraseña temporal de aspirantes (desarrollo) ───────────────────────────
enrollment.temporary-password=clubesMJ*

# ── AWS S3: valores dummy para desarrollo local ───────────────────────────────
# El S3Client se construye pero no hace llamadas reales hasta que se llame a uploadFile().
# En dev, la subida de archivos fallará si se intenta — es comportamiento esperado.
aws.access-key=dev-dummy-access-key
aws.secret-key=dev-dummy-secret-key
aws.region=us-east-1
aws.bucket-name=dev-dummy-bucket
